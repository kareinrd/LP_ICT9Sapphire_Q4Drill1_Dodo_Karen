<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>
<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(to right,#d6d6d6,#bdbba8);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:rgb(195, 207, 234);
    width:320px;
    padding:25px;
    border-radius:12px;
    text-align:center;
    box-shadow:0px 5px 20px rgba(0,0,0,0.2);
}

h2{
    font-size:18px;
    margin-bottom:10px;
}

.logo{
    font-size:28px;
    margin:10px 0;
}

label{
    font-weight:bold;
}

input{
    width:90%;
    padding:8px;
    margin:10px 0;
    border:1px solid rgb(12, 22, 222);
    border-radius:5px;
}

button{
    width:95%;
    padding:10px;
    background:#9fbfcf;
    border:none;
    border-radius:4px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#8b9aab;
}

    </style>
</head>

<body>

            <div class="card">
            <h2>Electricity Consumption Classifier</h2>
            <label>kWh</label>
            <input type="number" id="kwh" placeholder="Input kilowatt per hour">
            <button onclick="classify()">Consumption Classification</button>

        </div>
    <script>

    function classify(){

    let kwh = Number(document.getElementById("kwh").value);


    if(kwh < 0 || kwh === 0){
    alert("Please input a non-negative number");
    }

    else if(kwh <= 100){
    alert("Lifeline Consumer: Discounted electricity rates.");
    }

    else if(kwh <= 200){
    alert("Low Consumption: Normal residential rate.");
    }

    else if(kwh <= 300){
    alert("Average Consumption: Typical electricity usage.");
    }

    else if(kwh <= 500){
    alert("High Consumption: Higher electricity usage.");
    }

    else{
    alert("Very High Consumption: Heavy electricity users.");
    }
}

</script>

</body>
</html>
